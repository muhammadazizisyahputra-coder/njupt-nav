<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>登录 - 南邮直达</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #f4f7f6; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { display: block; width: 250px; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #005BAC; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户登录</h2>
        <input type="text" id="stuId" placeholder="请输入学号">
        <input type="password" id="pwd" placeholder="请输入密码">
        <button onclick="handleLogin()">立即登录</button>
        <p><a href="register.html">还没账号？去注册</a></p>
    </div>

    <script>
        function handleLogin() {
            const stuId = document.getElementById('stuId').value;
            const pwd = document.getElementById('pwd').value;

            if(!stuId || !pwd) {
                alert("请完整填写！");
                return;
            }

            // 从本地仓库拿数据
            const db = JSON.parse(localStorage.getItem('myDatabase')) || [];
            const user = db.find(u => u.stuId === stuId);

            if (!user) {
                alert("账号不存在，请先注册！");
            } else if (user.password !== pwd) {
                alert("密码错误！");
            } else {
                // 存入登录状态
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('studentName', user.name);
                alert("登录成功！欢迎 " + user.name);
                window.location.href = 'index.html'; 
            }
        }
    </script>
</body>
</html>
