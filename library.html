<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆预约 - 南邮直达</title>
    <style>
        :root { --njupt-blue: #005BAC; --glass-bg: rgba(255, 255, 255, 0.85); }
        body { margin: 0; font-family: 'PingFang SC', sans-serif; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1920&auto=format&fit=crop'); background-size: cover; filter: blur(15px); z-index: -1; }
        
        .header { display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); }
        .container { max-width: 600px; margin: 30px auto; background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 座位样式 */
        .seat-map { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .seat { height: 60px; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; background: white; }
        .seat.occupied { background: #f5f5f5; color: #ccc; cursor: not-allowed; border-color: #eee; }
        .seat.available:hover { border-color: var(--njupt-blue); color: var(--njupt-blue); transform: scale(1.05); }
        .seat.selected { background: var(--njupt-blue); color: white; border-color: var(--njupt-blue); animation: pulse 0.5s infinite alternate; }
        
        @keyframes pulse { from { box-shadow: 0 0 0px var(--njupt-blue); } to { box-shadow: 0 0 10px var(--njupt-blue); } }

        .book-btn { width: 100%; padding: 15px; background: var(--njupt-blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* Toast 样式 */
        .toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast-msg { background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; margin-bottom: 10px; animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    /* =========================================
               手机端响应式适配 (屏幕宽度 < 768px)
               ========================================= */
            @media (max-width: 768px) {
                .container {
                    margin: 15px;
                    padding: 20px 15px;
                }
                .seat-map {
                    gap: 10px; /* 缩小座位之间的间距 */
                }
                .seat {
                    height: 50px; /* 座位稍微变矮一点 */
                    font-size: 14px;
                }
            }
	</style>
</head>
<body>
    <header class="header">
        <a href="index.html" style="text-decoration: none; color: #333; font-weight: bold;">← 返回</a>
        <div style="font-weight: bold; color: var(--njupt-blue);">仙林图书馆3F</div>
    </header>

    <div class="container">
        <h3 style="margin-top:0">请选择座位</h3>
        <div class="seat-map">
            <div class="seat occupied">01<small>有人</small></div>
            <div class="seat available">02<small>空闲</small></div>
            <div class="seat available">03<small>空闲</small></div>
            <div class="seat occupied">04<small>有人</small></div>
            <div class="seat available">05<small>空闲</small></div>
            <div class="seat available">06<small>空闲</small></div>
            <div class="seat available">07<small>空闲</small></div>
            <div class="seat available">08<small>空闲</small></div>
        </div>
        <button class="book-btn" onclick="confirmBooking()">立即预约选定座位</button>
    </div>

    <script>
		// 在 smart.html, library.html, academic.html 的 script 顶部加入
		(function() {
		    const isLoggedIn = localStorage.getItem('isLoggedIn');
		    if (isLoggedIn !== 'true') {
		        alert('检测到未登录，请先验证身份！');
		        window.location.href = 'login.html';
		    }
		})();
        let selected = null;
        function showToast(msg) {
            let container = document.querySelector('.toast-container') || Object.assign(document.createElement('div'), {className: 'toast-container'});
            if (!container.parentElement) document.body.appendChild(container);
            const toast = Object.assign(document.createElement('div'), {className: 'toast-msg', innerHTML: msg});
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 2000);
        }

        document.querySelectorAll('.seat.available').forEach(seat => {
            seat.addEventListener('click', function() {
                if(selected) selected.classList.remove('selected');
                this.classList.add('selected');
                selected = this;
                showToast(`📍 已选中 ${this.firstChild.textContent} 号座位`);
            });
        });

        function confirmBooking() {
            if(!selected) {
                showToast("⚠️ 请先点击选择一个空闲座位");
                return;
            }
            showToast(`✅ 预约成功！座号：${selected.firstChild.textContent}`);
            selected.className = 'seat occupied';
            selected.innerHTML = selected.firstChild.textContent + '<small>本人</small>';
            selected = null;
        }
    </script>
</body>
</html>
