<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>完整考试计划 - 南邮直达</title>
    <style>
        /* 保持统一的背景风格 */
        body {
            margin: 0; padding: 20px; font-family: 'PingFang SC', sans-serif;
            background-color: #f4f5f7;
        }
        .container {
            max-width: 800px; margin: 20px auto; background: white; 
            padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; color: #005BAC; }
        
        /* 课表卡片设计 */
        .course-list { display: flex; flex-direction: column; gap: 15px; }
        .course-card {
            padding: 15px; border-left: 5px solid #005BAC; background: #fafafa;
            border-radius: 0 8px 8px 0; display: flex; justify-content: space-between;
        }
        .course-info h4 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .course-info p { margin: 0; font-size: 13px; color: #666; }
        .course-time { text-align: right; font-size: 14px; color: #005BAC; font-weight: bold; }

        .back-btn {
            margin-top: 30px; padding: 10px 20px; border: none; background: #eee;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .back-btn:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📅 本周考试计划 </h2>
            <span id="studentNameDisplay" style="font-size: 14px; color: #666;"></span>
        </div>

        <div class="course-list">
            <div class="course-card" style="border-left-color: #FF6B6B;">
                <div class="course-info">
                    <h4>高等数学A</h4>
                    <p>📍 教1-204</p>
                </div>
                <div class="course-time">6月19号 13：00<br>08:00 - 09:40</div>
            </div>

            <div class="course-card" style="border-left-color: #4ECDC4;">
                <div class="course-info">
                    <h4>大学物理</h4>
                    <p>📍 教2-311</p>
                </div>
                <div class="course-time">6月20号<br>10:00 - 11:40</div>
            </div>

            <div class="course-card" style="border-left-color: #45B7D1;">
                <div class="course-info">
                    <h4>计算机网络</h4>
                    <p>📍 仙林-微机实验室1</p>
                </div>
                <div class="course-time">6月21号<br>14:00 - 15:40</div>
            </div>
        </div>

        <button class="back-btn" onclick="history.back()">⬅ 返回快捷入口</button>
    </div>

    <script>
        // 权限检查
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("登录失效，请重新登录");
            window.location.href = '../login.html';
        }
        
        // 显示本地存储的用户姓名
        const name = localStorage.getItem('studentName');
        if (name) {
            document.getElementById('studentNameDisplay').innerText = name + " 的课表";
        }
    </script>
</body>
</html>
