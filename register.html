<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生注册 - 南邮直达</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f5f7; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #005BAC; color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { display: block; margin-top: 15px; color: #005BAC; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #005BAC;">注册新账号</h2>
        <input type="text" id="regStuId" placeholder="请输入学号">
        <input type="text" id="regName" placeholder="请输入你的昵称">
        <input type="password" id="regPwd" placeholder="请输入密码">
        <button onclick="handleRegister()">立即注册</button>
        <a href="login.html">已有账号？去登录</a>
    </div>

    <script>
		(function checkLogin() {
		    const isLoggedIn = localStorage.getItem('isLoggedIn');
		    if (isLoggedIn !== 'true') {
		        alert("检测到未登录，请先验证身份！");
		        window.location.href = '../login.html'; // 强制跳转
		    }
		})();
        function handleRegister() {
            const stuId = document.getElementById('regStuId').value;
            const name = document.getElementById('regName').value;
            const pwd = document.getElementById('regPwd').value;

            if(!stuId || !name || !pwd) {
                alert("请填写完整信息！"); return;
            }

            // 1. 打开本地仓库（如果没有，就建一个空数组）
            let db = JSON.parse(localStorage.getItem('myDatabase')) || [];

            // 2. 检查学号是否重复
            if(db.find(user => user.stuId === stuId)) {
                alert("这个学号已经注册过啦！"); return;
            }

            // 3. 把新用户塞进数组，并存回本地仓库
            db.push({ stuId: stuId, name: name, password: pwd });
            localStorage.setItem('myDatabase', JSON.stringify(db));

            alert("✅ 注册成功！现在带你去登录...");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
