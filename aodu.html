<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥都外卖 - 南邮直达</title>
    <style>
        :root { --njupt-blue: #005BAC; --theme-orange: #FF7F50; --glass-bg: rgba(255, 255, 255, 0.85); }
        body { margin: 0; font-family: 'PingFang SC', sans-serif; color: #333; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 15px 5%; background: white; border-bottom: 1px solid #eee; }
        .back-link { text-decoration: none; color: #333; font-weight: bold; }
        
        .main-content { flex: 1; display: flex; overflow: hidden; max-width: 1000px; margin: 0 auto; width: 100%; background: white; }
        
        .sidebar { width: 120px; background: #F8F9FA; overflow-y: auto; }
        .category { padding: 18px 15px; text-align: center; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .category.active { background: white; color: var(--theme-orange); font-weight: bold; border-left: 3px solid var(--theme-orange); }
        
        .menu-list { flex: 1; padding: 20px; overflow-y: auto; }
        .food-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed #eee; }
        .food-info h4 { margin: 0 0 5px 0; font-size: 16px; }
        .food-info p { margin: 0; font-size: 12px; color: #999; }
        .price { color: var(--theme-orange); font-weight: bold; font-size: 18px; margin-top: 5px; }
        
        .add-btn { background: var(--theme-orange); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        /* 底部购物车悬浮 */
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: #333; color: white; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .checkout-btn { background: var(--theme-orange); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    /* =========================================
               高级轻提示 (Toast) 样式与动画
               ========================================= */
            .toast-container {
                position: fixed;
                top: 30px; /* 距离顶部一点距离 */
                left: 50%;
                transform: translateX(-50%);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                gap: 12px;
                pointer-events: none; /* 让鼠标能穿透它点击下方的元素 */
            }
    
            .toast-msg {
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(10px);
                color: white;
                padding: 12px 24px;
                border-radius: 50px; /* 圆角胶囊形状 */
                font-size: 14px;
                font-weight: bold;
                box-shadow: 0 8px 20px rgba(0,0,0,0.15);
                display: flex;
                align-items: center;
                gap: 8px;
                /* 进场动画 */
                animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            }
    
            /* 离场动画类 */
            .toast-msg.fade-out {
                animation: slideUp 0.3s ease-in forwards;
            }
    
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-20px) scale(0.9); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }
    
            @keyframes slideUp {
                from { opacity: 1; transform: translateY(0) scale(1); }
                to { opacity: 0; transform: translateY(-20px) scale(0.9); }
            }
			/* =========================================
			           手机端响应式适配 (屏幕宽度 < 768px)
			           ========================================= */
			        @media (max-width: 768px) {
			            .main-content {
			                flex-direction: column; /* 布局从左右变上下 */
			            }
			            .sidebar {
			                width: 100%;
			                display: flex; /* 变成分类横向排列 */
			                overflow-x: auto; /* 允许横向滑动 */
			                white-space: nowrap;
			                border-bottom: 1px solid #eee;
			            }
			            .category {
			                padding: 12px 20px;
			                border-bottom: 2px solid transparent;
			                border-left: none !important; /* 取消左边的高亮线 */
			            }
			            .category.active {
			                border-bottom-color: var(--theme-orange); /* 高亮线移到下方 */
			            }
			            .menu-list {
			                padding-bottom: 90px; /* 关键：给底部悬浮的购物车留出空间，防止菜品被挡住 */
			            }
			            .cart-bar {
			                width: 95%; /* 购物车在手机上更宽 */
			                bottom: 15px;
			            }
			        }
			        /* 隐藏滚动条让菜单更美观 */
			        .sidebar::-webkit-scrollbar { display: none; }
	</style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-link">← 返回首页</a>
        <div style="font-weight: bold; color: var(--theme-orange);">奥都专送 (免配送费)</div>
    </header>
    
    <div class="main-content">
        <div class="sidebar">
            <div class="category active">今日特价</div>
            <div class="category">盖浇饭/面</div>
            <div class="category">香锅/麻辣烫</div>
            <div class="category">奶茶饮品</div>
        </div>
        
        <div class="menu-list">
            <div class="food-item">
                <div class="food-info">
                    <h4>土豆牛肉盖浇饭</h4>
                    <p>月售 800+ | 好评度 98%</p>
                    <div class="price">¥ 14.00</div>
                </div>
                <button class="add-btn">+</button>
            </div>
            <div class="food-item">
                <div class="food-info">
                    <h4>招牌黄焖鸡米饭 (大份)</h4>
                    <p>月售 1200+ | 赠送例汤</p>
                    <div class="price">¥ 16.50</div>
                </div>
                <button class="add-btn">+</button>
            </div>
            <div class="food-item">
                <div class="food-info">
                    <h4>冰鲜柠檬水 (大杯)</h4>
                    <p>清凉解暑</p>
                    <div class="price">¥ 4.00</div>
                </div>
                <button class="add-btn">+</button>
            </div>
        </div>
    </div>

    <div class="cart-bar">
        <div>🛒 购物车 <span style="margin-left: 10px; font-size: 20px; font-weight: bold;">¥ 0.00</span></div>
        <button class="checkout-btn">去结算</button>
    </div>
	<script>
	        // ==========================================
	        // 核心：全局轻提示 (Toast) 引擎
	        // ==========================================
	        function showToast(message) {
	            // 1. 检查页面有没有存放 Toast 的容器，没有就建一个
	            let container = document.querySelector('.toast-container');
	            if (!container) {
	                container = document.createElement('div');
	                container.className = 'toast-container';
	                document.body.appendChild(container);
	            }
	
	            // 2. 创建一条新的提示
	            const toast = document.createElement('div');
	            toast.className = 'toast-msg';
	            toast.innerHTML = message; // 支持 Emoji 和 HTML
	            container.appendChild(toast);
	
	            // 3. 设定 2.5 秒后自动消失
	            setTimeout(() => {
	                toast.classList.add('fade-out'); // 触发消失动画
	                // 等动画播完，把元素从页面彻底删掉，保持页面干净
	                setTimeout(() => toast.remove(), 300);
	            }, 2500);
	        }
	
	        // ==========================================
	        // 外卖页面交互逻辑
	        // ==========================================
	        let totalAmount = 0;
	        const cartTotalDisplay = document.querySelector('.cart-bar span');
	        const addBtns = document.querySelectorAll('.add-btn');
	        
	        addBtns.forEach(btn => {
	            btn.addEventListener('click', function() {
	                const foodName = this.previousElementSibling.querySelector('h4').innerText;
	                const priceText = this.previousElementSibling.querySelector('.price').innerText;
	                const price = parseFloat(priceText.replace('¥', '').trim());
	                
	                totalAmount += price;
	                cartTotalDisplay.innerText = '¥ ' + totalAmount.toFixed(2);
	                
	                // 【精髓来了】用高级的 Toast 替代单调的加购反馈！
	                showToast(`🛒 已将 <b>${foodName}</b> 加入购物车`);
	                
	                this.innerText = '✓';
	                this.style.background = '#4CAF50';
	                setTimeout(() => {
	                    this.innerText = '+';
	                    this.style.background = 'var(--theme-orange)';
	                }, 500);
	            });
	        });
	
	        document.querySelector('.checkout-btn').addEventListener('click', () => {
	            if(totalAmount === 0) {
	                // 用 Toast 替换 alert()
	                showToast('⚠️ 购物车空空的，先去点点好吃的吧！');
	                return;
	            }
	            // 用 Toast 替换 alert()
	            showToast(`🎉 <b>下单成功！</b><br>共支付 ¥${totalAmount.toFixed(2)}，预计30分钟送达`);
	            
	            totalAmount = 0;
	            cartTotalDisplay.innerText = '¥ 0.00';
	        });
	
	        const categories = document.querySelectorAll('.category');
	        categories.forEach(item => {
	            item.addEventListener('click', function() {
	                categories.forEach(el => el.classList.remove('active'));
	                this.classList.add('active');
	            });
	        });
	    </script>
</body>
</html>
