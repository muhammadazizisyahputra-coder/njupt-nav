<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园 - 南邮直达</title>
    <style>
        :root { --njupt-blue: #005BAC; --text-main: #333333; --text-light: #666666; --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.5); }
        body { margin: 0; font-family: 'PingFang SC', sans-serif; color: var(--text-main); min-height: 100vh; }
        body::before { content: ""; position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; filter: blur(15px) brightness(0.9); z-index: -1; }
        
        /* 顶部导航 */
        .header { display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); }
        .back-link { text-decoration: none; color: var(--text-main); font-weight: bold; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; display: grid; gap: 20px; grid-template-columns: 1fr 1.5fr; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        
        /* 卡片内部样式 */
        .balance-box { background: linear-gradient(135deg, var(--njupt-blue), #003F7A); color: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .balance-box:hover { transform: scale(1.02); }
        .balance-box h4 { margin: 0 0 10px 0; font-weight: normal; font-size: 14px; opacity: 0.8; }
        .balance-box .amount { font-size: 32px; font-weight: bold; margin: 0; }
        
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .service-item { padding: 15px; background: rgba(255,255,255,0.6); border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .service-item:hover { background: #fff; transform: translateY(-3px); color: var(--njupt-blue); }
        .service-icon { font-size: 28px; margin-bottom: 8px; }

        /* --- Toast 轻提示核心样式 --- */
        .toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-msg { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); color: white; padding: 10px 20px; border-radius: 50px; font-size: 14px; animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        .toast-msg.fade-out { animation: slideUp 0.3s ease-in forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
		/* =========================================
		           手机端响应式适配 (屏幕宽度 < 768px)
		           ========================================= */
		        @media (max-width: 768px) {
		            .container {
		                grid-template-columns: 1fr; /* 取消左右分布，变为上下堆叠 */
		            }
		            .service-grid {
		                grid-template-columns: repeat(2, 1fr); /* 手机上服务图标一行放2个 */
		            }
		            .balance-box { padding: 15px; }
		        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-link">← 返回首页</a>
        <div style="font-weight: bold; color: var(--njupt-blue);">智慧校园</div>
    </header>
    <div class="container">
        <div class="glass-card">
            <h3 style="margin-top: 0;">我的资产</h3>
            <div class="balance-box" id="cardRecharge">
                <h4>校园卡余额</h4>
                <p class="amount">¥ 124.50</p>
                <div style="margin-top: 10px; font-size: 12px; text-align: right;">点击充值 ＞</div>
            </div>
            <div class="balance-box" style="background: linear-gradient(135deg, #FF9A9E, #FECFEF); color: #333;" id="powerRecharge">
                <h4>宿舍电费 (仙林菊苑)</h4>
                <p class="amount" style="color: #E74C3C;">2.4 度</p>
                <div style="margin-top: 10px; font-size: 12px; text-align: right; color: #E74C3C;">余额不足，去缴费 ＞</div>
            </div>
        </div>
        <div class="glass-card">
            <h3 style="margin-top: 0;">校园服务</h3>
            <div class="service-grid">
                <div class="service-item"><div class="service-icon">🚌</div><div>校车时刻</div></div>
                <div class="service-item"><div class="service-icon">🔧</div><div>后勤报修</div></div>
                <div class="service-item"><div class="service-icon">🏟️</div><div>场馆预约</div></div>
                <div class="service-item"><div class="service-icon">🏥</div><div>校医院</div></div>
                <div class="service-item"><div class="service-icon">🌐</div><div>校园网</div></div>
                <div class="service-item"><div class="service-icon">💼</div><div>失物招领</div></div>
            </div>
        </div>
    </div>

    <script>
		// 在 smart.html, library.html, academic.html 的 script 顶部加入
		(function() {
		    const isLoggedIn = localStorage.getItem('isLoggedIn');
		    if (isLoggedIn !== 'true') {
		        alert('检测到未登录，请先验证身份！');
		        window.location.href = 'login.html';
		    }
		})();
        function showToast(msg) {
            let container = document.querySelector('.toast-container') || Object.assign(document.createElement('div'), {className: 'toast-container'});
            if (!container.parentElement) document.body.appendChild(container);
            const toast = Object.assign(document.createElement('div'), {className: 'toast-msg', innerHTML: msg});
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 300); }, 2000);
        }

        // 服务点击
        document.querySelectorAll('.service-item').forEach(item => {
            item.addEventListener('click', () => showToast(`🚀 正在进入<b>${item.innerText.trim()}</b>系统...`));
        });

        // 模拟充值
        document.querySelectorAll('.balance-box').forEach(box => {
            box.addEventListener('click', () => {
                const val = prompt("请输入充值金额：", "50");
                if(val) showToast(`✅ 成功充值 ¥${val}，余额已更新`);
            });
        });
    </script>
</body>
</html>
