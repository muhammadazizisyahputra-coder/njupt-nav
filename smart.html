<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧校园 - 南邮直达</title>
    <style>
        body {
            margin: 0; padding: 20px; font-family: 'PingFang SC', sans-serif;
            background-color: #f4f6f9; color: #333;
        }
        .container {
            max-width: 600px; margin: 30px auto; 
        }
        h2 { font-size: 20px; color: #333; margin-bottom: 20px; padding-left: 5px; }

        /* 3列 x 2行 的网格布局 */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 平分3列 */
            gap: 15px; /* 卡片之间的间距 */
            margin-bottom: 30px;
        }

        /* 完美还原截图的卡片样式 */
        .grid-item {
            background: white;
            border-radius: 12px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* 图标和文字的间距 */
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 91, 172, 0.1);
        }

        /* 图标放大一点更好看 */
        .grid-item span.icon { font-size: 28px; }

        .back-btn {
            display: block; width: 100%; padding: 12px; background: white;
            border: 1px solid #ddd; border-radius: 10px; font-size: 16px; 
            cursor: pointer; transition: 0.3s; text-align: center; color: #666;
        }
        .back-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>校园服务</h2>
        
        <div class="service-grid">
            <a href="pages/school_bus.html" class="grid-item"><span class="icon">🚌</span>校车时刻</a>
                <a href="pages/repair.html" class="grid-item"><span class="icon">🔧</span>后勤报修</a>
                <a href="pages/campus_card.html" class="grid-item"><span class="icon">💳</span>一卡通</a>
            <a href="pages/venue.html" class="grid-item"><span class="icon">🏟️</span>场馆预约</a>
            <a href="pages/hospital.html" class="grid-item"><span class="icon">🏥</span>校医院</a>
            <a href="pages/network.html" class="grid-item"><span class="icon">🌐</span>校园网</a>
            <a href="pages/lost_found.html" class="grid-item"><span class="icon">💼</span>失物招领</a>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">返回首页</button>
    </div>
</body>
</html>
