<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南邮直达 - 极简校园服务平台</title>
    <style>
       /* 核心配色：南邮蓝与纯白背景 */
       :root {
           --njupt-blue: #005BAC; 
           --text-main: #333333;
           --text-light: #666666;
       }
       
       /* 全局基础设置 */
       body {
           margin: 0;
           padding: 0;
           font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
           color: var(--text-main);
           /* 取消了原来的背景色，因为我们要用背景图 */
       }
       
       /* 核心魔法：使用伪元素制作全屏模糊背景 */
       body::before {
           content: "";
           position: fixed; /* 固定在底层，不随页面滚动 */
           top: -5%; 
           left: -5%; 
           width: 110%; /* 稍微放大一点，防止边缘模糊透出白边 */
           height: 110%;
           /* 这里替换成你的图片路径，如果你还没有图，可以先用这个在线的风景图占位测试 */
           background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1920&auto=format&fit=crop'); 
           background-size: cover;
           background-position: center;
           /* blur是模糊度，brightness是亮度(调暗一点让白色字/卡片更清晰) */
           filter: blur(15px) brightness(0.9); 
           z-index: -1; /* 确保背景图在所有内容的下面 */
       }
       
       /* 顶部导航栏 */
       .header {
           display: flex;
           justify-content: space-between;
           align-items: center;
           padding: 20px 5%;
           position: relative;
           z-index: 1;
       }
       
       .logo {
           font-size: 22px;
           font-weight: bold;
           color: var(--njupt-blue);
           text-decoration: none;
           letter-spacing: 1px;
           /* 给Logo加一点白色发光，防止在复杂背景下看不清 */
           text-shadow: 0 0 10px rgba(255,255,255,0.8);
       }
       
       .login-btn {
           font-size: 14px;
           color: var(--text-main);
           text-decoration: none;
           font-weight: bold;
           padding: 8px 16px;
           background: rgba(255,255,255,0.6);
           border-radius: 20px;
           transition: all 0.3s;
       }
       
       .login-btn:hover {
           color: white;
           background: var(--njupt-blue);
       }
       
       /* 中心主体区域 */
       .main-container {
           max-width: 800px;
           margin: 10vh auto 0; 
           text-align: center;
           padding: 0 20px;
           position: relative;
           z-index: 1; /* 确保内容在背景图上方 */
       }
       
       /* 极简超级搜索框 - 升级为毛玻璃质感 */
       .search-wrapper {
           position: relative;
           margin-bottom: 25px;
       }
       
       .search-box {
           width: 100%;
           padding: 18px 30px;
           font-size: 18px;
           border: 1px solid rgba(255, 255, 255, 0.4);
           border-radius: 50px;
           outline: none;
           box-sizing: border-box;
           /* 半透明白色背景 + 背景模糊 = 高级毛玻璃效果 */
           background-color: rgba(255, 255, 255, 0.85);
           backdrop-filter: blur(10px);
           transition: all 0.3s ease;
           box-shadow: 0 8px 20px rgba(0,0,0,0.05);
       }
       
       .search-box:focus {
           border-color: var(--njupt-blue);
           box-shadow: 0 0 15px rgba(0, 91, 172, 0.3);
           background-color: #FFFFFF;
       }
       
       /* 快捷导航 */
       .quick-nav {
           display: flex;
           justify-content: center;
           gap: 40px;
           margin-bottom: 60px;
       }
       
       .quick-nav a {
           text-decoration: none;
           /* 为了在复杂背景下清晰，文字加深并加一点文字阴影 */
           color: #111; 
           font-weight: 500;
           font-size: 15px;
           text-shadow: 0 2px 4px rgba(255,255,255,0.5);
           transition: color 0.3s;
       }
       
       .quick-nav a:hover {
           color: var(--njupt-blue);
       }
       
       /* 工具箱卡片网格 */
       .toolbox {
                      display: flex;              /* 开启弹性布局 */
                      justify-content: center;    /* 让整体居中显示 */
                      gap: 40px;                  /* 关键！设置卡片之间的均匀间距，数字越大隔得越开 */
                      width: 100%;                /* 确保容器有足够的宽度去排布卡片 */
                      max-width: 900px;           /* 限制一个最大宽度，防止在大屏幕上分得太散 */
                      margin: 30px auto;          /* 保证整个盒子在页面水平居中，并与上下元素留出 30px 距离 */
                  
       }
       
       /* 卡片升级为毛玻璃质感 */
       .tool-card {
           background: rgba(255, 255, 255, 0.75); /* 75%透明度的白色 */
           backdrop-filter: blur(12px); /* 吸收背后的风景图颜色 */
           padding: 25px 20px;
           border-radius: 15px;
           text-decoration: none;
           color: var(--text-main);
           border: 1px solid rgba(255, 255, 255, 0.5); /* 淡淡的白边 */
           text-align: left;
           transition: all 0.3s ease;
           cursor: pointer;
           box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
       }
       
       .tool-card:hover {
           transform: translateY(-5px);
           box-shadow: 0 12px 25px rgba(0, 91, 172, 0.15);
           border-color: var(--njupt-blue);
           background: rgba(255, 255, 255, 0.95); /* 悬停时变白一点 */
       }
       
       .tool-title {
           margin: 0 0 10px 0;
           font-size: 18px;
           font-weight: bold;
           color: var(--text-main);
           display: flex;
           align-items: center;
           justify-content: space-between;
       }
       
       .badge-hot {
           background-color: #FF4757;
           color: white;
           font-size: 12px;
           padding: 3px 8px;
           border-radius: 4px;
           font-weight: normal;
       }
       
       .tool-desc {
           margin: 0;
           font-size: 13px;
           color: var(--text-light);
           line-height: 1.6;
       }
	   
    </style>
</head>
<body>
	<button id="logoutBtn" onclick="logout()" style="
	    display: none; /* 初始隐藏 */
	    position: fixed; 
	    top: 20px; 
	    right: 20px; 
	    padding: 8px 15px; 
	    background: rgba(255, 255, 255, 0.4); 
	    backdrop-filter: blur(10px);
	    border: 1px solid rgba(255,255,255,0.3);
	    border-radius: 20px; 
	    color: #333;
	    font-size: 12px;
	    font-weight: bold;
	    cursor: pointer; 
	    z-index: 1000;
	    transition: 0.3s;
	">
	    退出登录 🚪
	</button>
	
	<script>
	    // 页面加载时：判断是否显示退出按钮
	    window.onload = function() {
	        const isLoggedIn = localStorage.getItem('isLoggedIn');
	        if (isLoggedIn === 'true') {
	            document.getElementById('logoutBtn').style.display = 'block';
	        }
	    }
	
	    // 退出登录函数
	    function logout() {
	        if(confirm('确定要退出登录吗？')) {
	            localStorage.removeItem('isLoggedIn');
	            localStorage.removeItem('studentName');
	            alert('已安全退出');
	            location.reload(); // 刷新页面，按钮会自动隐藏，进入功能也会提示登录
	        }
	    }
	</script>

    <header class="header">
        <a href="#" class="logo">● 南邮直达</a>
        <a href="#" class="login-btn">学生登录</a>
    </header>

    <main class="main-container">
        <div class="search-wrapper">
            <input type="text" class="search-box" placeholder="搜索教务通知、空闲教室、复习资料...">
        </div>

       <nav class="quick-nav">
           <a href="javascript:void(0)" onclick="checkAccess('academic.html')">教务系统</a>
           <a href="javascript:void(0)" onclick="checkAccess('smart.html')">智慧校园</a>
           <a href="javascript:void(0)" onclick="checkAccess('library.html')">图书馆预约</a>
           <a href="javascript:void(0)" onclick="checkAccess('aodu.html')">奥都外卖</a>
       </nav>
       
       <script>
           function checkAccess(targetUrl) {
               const isLoggedIn = localStorage.getItem('isLoggedIn');
               if (isLoggedIn === 'true') {
                   window.location.href = targetUrl;
               } else {
                   alert('该功能需要登录后使用，请先登录！');
                   window.location.href = 'login.html';
               }
           }
       </script>

       <div class="toolbox">
           <a href="javascript:void(0);" class="tool-card" onclick="checkAccess('resources.html')">
               <h3 class="tool-title">
                   期末资料库
                   <span class="badge-hot">首发</span>
               </h3>
               <p class="tool-desc">收录历年真题卷、各学院学霸笔记与速记PPT。</p>
           </a>
       
           <a href="javascript:void(0);" class="tool-card" onclick="checkAccess('classroom.html')">
               <h3 class="tool-title">空闲教室</h3>
               <p class="tool-desc">一键查询仙林/三牌楼校区实时空闲自习室。</p>
           </a>
       
           <a href="javascript:void(0);" class="tool-card" onclick="checkAccess('market.html')">
               <h3 class="tool-title">二手教材</h3>
               <p class="tool-desc">校内专属低价教材、四六级书籍漂流转让。</p>
           </a>
       </div>
    </main>

</body>
</html>
